# Woodpecker CI pipeline for Conduit (self-hosted on snowman, Woodpecker v3.x).
#
# Mirrors the GitHub Actions matrix in .github/workflows/linux.yml with two
# additions specific to the AOT-without-conduit-build migration:
#   - aot-smoke: scaffolds a minimal channel-only app and proves
#     `dart run build_runner build && dart compile exe` produces a
#     working binary against the current workspace packages. This is
#     the deployment gate for the new build path.
#   - build-runner-tests: runs the conduit_build_runner package's own
#     unit tests as a fast first-line signal that the codegen pipeline
#     is intact.
#
# Pipeline shape:
#   bootstrap (sequential, fills .pub-cache shared via workspace dir)
#     ├── lint
#     ├── build-runner-tests
#     ├── workspace-unit-tests (non-DB packages)
#     ├── aot-smoke           ← build_runner path (hand-rolled app)
#     ├── template-aot-smoke  ← `conduit create -t default` → AOT binary
#     └── core-integration-tests (with postgres service)
#
# PUB_CACHE is exported from inside `commands:` (not from `environment:`)
# because the pipeline-level `${CI_WORKSPACE}` interpolation expands
# *before* CI_WORKSPACE is bound and resolves to the empty string. Doing
# the export at shell time uses the runtime value Woodpecker injects
# into the step container.
#
# Anything below this comment that fails on master is a deployable-state
# regression — see ci/README.md for the full criteria.

when:
  - event: pull_request
  - event: push
    branch: [main, master]

variables:
  - &dart_image dart:beta

steps:
  bootstrap:
    image: *dart_image
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - dart pub global activate melos
      - melos bootstrap

  lint:
    image: *dart_image
    depends_on: [bootstrap]
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - melos run analyze

  build-runner-tests:
    image: *dart_image
    depends_on: [bootstrap]
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - cd packages/build_runner && dart test -r failures-only

  workspace-unit-tests:
    image: *dart_image
    depends_on: [bootstrap]
    environment:
      # conduit_config tests assert these are set; values match ci/.env.
      TEST_VALUE: '1'
      TEST_BOOL: 'true'
      TEST_DB_ENV_VAR: 'postgres://user:password@host:5432/dbname'
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - melos exec --fail-fast
        --scope conduit_codable
        --scope conduit_open_api
        --scope conduit_password_hash
        --scope conduit_config
        -- "dart test -r failures-only"

  aot-smoke:
    image: *dart_image
    depends_on: [bootstrap, build-runner-tests]
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - bash ci/aot-smoke.sh

  template-aot-smoke:
    image: *dart_image
    depends_on: [bootstrap, build-runner-tests]
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - dart pub global activate -spath packages/cli
      - melos cache-source --no-select
      - bash ci/template-aot-smoke.sh

  core-integration-tests:
    image: *dart_image
    depends_on: [bootstrap]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: conduit_test_user
      POSTGRES_PASSWORD: 'conduit!'
      POSTGRES_DB: conduit_test_db
      PGPASSWORD: 'conduit!'
      TEST_DB_ENV_VAR: 'postgres://user:password@host:5432/dbname'
      TEST_VALUE: '1'
      TEST_BOOL: 'true'
    commands:
      - export PUB_CACHE="$CI_WORKSPACE/.pub-cache"
      - export PATH="$PATH:$PUB_CACHE/bin"
      - cd packages/core
      - dart test -r failures-only

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: conduit_test_user
      POSTGRES_PASSWORD: 'conduit!'
      POSTGRES_DB: conduit_test_db
