name: Linux

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: "linux-test"
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: [beta, main]
    steps:
    - uses: actions/checkout@v4
    - uses: dart-lang/setup-dart@v1
      with:
        sdk: ${{ matrix.sdk }}
    - name: Setup Conduit
      run: |
        export PUB_CACHE="$HOME/.pub-cache"
        export PATH="$PATH:$PUB_CACHE/bin"
        echo "PUB_CACHE=$PUB_CACHE" >> "$GITHUB_ENV"
        echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
        dart pub global activate melos
        dart pub global activate -spath packages/cli
        melos bootstrap
        melos cache-source --no-select
    - name: Template AOT smoke
      run: bash ci/template-aot-smoke.sh
  unit:
    needs: smoke
    if: |
      startsWith(github.head_ref, 'feat/')
      || startsWith(github.head_ref, 'fix/')
      || startsWith(github.head_ref, 'refactor/')
      || startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [beta]
    env:
      TEST_DIR: packages/core
    services:
      postgres:
        # Track the PG 18 major. The macOS workflow uses
        # ikalnytskyi/action-setup-postgres@v8 which also defaults to PG 18
        # major (latest patch). Pinning to 18.0 here held Linux at the
        # initial release while macOS got patch fixes — version skew
        # caused Linux-only test failures during the AOT-migration window.
        image: postgres:18
        env:
          POSTGRES_USER: conduit_test_user
          POSTGRES_PASSWORD: conduit!
          PGPASSWORD: conduit!
          POSTGRES_DB: conduit_test_db
          POSTGRES_PORT: 15432
        ports:
          - 15432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - name: Get Dependencies
        run: |
          export PUB_CACHE="$HOME/.pub-cache"
          export PATH="$PATH:$PUB_CACHE/bin"
          echo "PUB_CACHE=$PUB_CACHE" >> "$GITHUB_ENV"
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
          dart pub global activate -spath packages/cli
          dart pub global activate melos
          melos bootstrap
          melos cache-source --no-select
          dart pub get --directory=packages/isolate_exec_test_packages/test_package --offline
      - name: Run tests
        working-directory: ${{ env.TEST_DIR }}
        run: . ../../ci/.env && dart test -r failures-only
  bench:
    needs: smoke
    runs-on: ubuntu-latest
    # Non-gating: surfaces bench numbers in the run summary so reviewers
    # can eyeball regressions without blocking the PR. Pair with the
    # methodology + verdict captured in packages/core/bench/RESULTS.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: beta
      - name: Bootstrap
        run: |
          export PUB_CACHE="$HOME/.pub-cache"
          export PATH="$PATH:$PUB_CACHE/bin"
          echo "PUB_CACHE=$PUB_CACHE" >> "$GITHUB_ENV"
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
          dart pub global activate melos
          melos bootstrap
      - name: Run benches
        working-directory: packages/core
        run: bash ../../ci/run-benches.sh
        continue-on-error: true
